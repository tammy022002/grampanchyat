<div class="app-layout" *ngIf="authStore.isAuthenticated(); else unauthLayout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      Gram Panchayat ERP
    </div>
    <div class="sidebar-content">
      <ul class="nav-links">
        <li><a routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a></li>
      </ul>
      
      <div *ngFor="let category of menuCategories" class="menu-category">
        <div class="category-title">{{ category.title }}</div>
        <ul class="nav-links">
          <li *ngFor="let item of category.items">
            <a [routerLink]="item.path" routerLinkActive="active-link">{{ item.label }}</a>
          </li>
        </ul>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <header class="topbar">
      <div class="user-profile">
        <span>Logged in as: <strong>{{ authStore.username() || 'Admin User' }}</strong></span>
        <button (click)="logout()" class="logout-btn">Logout</button>
      </div>
    </header>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<ng-template #unauthLayout>
  <router-outlet></router-outlet>
</ng-template>
